<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vielen Dank | Schanzer Marketing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Manrope', sans-serif;
            font-weight: 400;
            font-size: 16px;
            line-height: 1.5;
            color: #1C1C1E;
            background: #FFFFFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1, h2 { font-family: 'Inter', sans-serif; font-weight: 600; line-height: 1.3; letter-spacing: -0.4px; }

        .thankyou {
            text-align: center;
            padding: 40px 24px;
            max-width: 600px;
        }

        .thankyou-icon {
            width: 120px;
            height: 120px;
            background: #34C759;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 48px;
        }
        .thankyou-icon svg {
            width: 56px;
            height: 56px;
        }

        .thankyou h1 {
            font-size: clamp(28px, 5vw, 42px);
            margin-bottom: 20px;
            color: #1C1C1E;
        }

        .thankyou p {
            font-size: 17px;
            color: #48484A;
            line-height: 1.65;
            max-width: 500px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <main class="thankyou">
        <div class="thankyou-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 13l4 4L19 7"/>
            </svg>
        </div>
        <h1>Vielen Dank, für deine Anfrage</h1>
        <p>Ich melde mich kurzfristig telefonisch bei dir, um dein Projekt persönlich mit dir zu besprechen.</p>
    </main>
</body>
</html>
